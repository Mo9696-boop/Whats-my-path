function getProfileType(){
  const c=state.cats,v=state.values,r=state.risk,w=state.workstyle;
  const h=(s,id)=>s.has(id)?1:0;
  const types=[
    {id:'deep_scientist',name:'The Deep Scientist',tagline:'Built for depth, driven by curiosity',col:'#1D9E75',desc:"Your scientific identity is inseparable from closeness to the work - experiments, hypotheses, and the patient accumulation of evidence. You do your best thinking with focused, uninterrupted time and genuine intellectual freedom. That is not a limitation. It is the profile of researchers who generate the foundational ideas that everyone else builds on.",s:h(c,'bench')*4+h(c,'design')*3+h(v,'intellectual')*4+h(v,'reputation')*2+(r==='stable'?2:0)+(w==='independent'?3:0)+(w==='small_team'?1:0)},
    {id:'data_thinker',name:'The Data Thinker',tagline:'Where complexity becomes clarity',col:'#7F77DD',desc:"You see patterns where others see noise. Given complex, messy data, you do not get overwhelmed - you get curious. The ability to transform quantitative complexity into actionable insight is one of the most commercially valuable capabilities a researcher can carry out of academic training.",s:h(c,'data')*5+h(c,'synthesis')*2+h(v,'impact')*2+h(v,'financial')*2+(r==='moderate'?2:0)},
    {id:'storyteller',name:'The Science Storyteller',tagline:'The rare researcher who can make it land',col:'#D4537E',desc:"You have something genuinely rare: the ability to make complex science not just understandable but compelling - to funders who need to prioritize it, patients who need to understand it, and publics who need to trust it. That translation layer is where enormous amounts of scientific and societal value get created.",s:h(c,'communication')*5+h(c,'writing')*4+h(v,'teaching')*3+h(v,'impact')*2+(w==='stakeholders'?2:0)},
    {id:'strategic_mind',name:'The Strategic Mind',tagline:'Science meets business at the highest level',col:'#BA7517',desc:"You zoom out naturally. Competitive landscapes, resource allocation, long-term implications of today's decisions - these are the problems that genuinely interest you. That is not a diversion from science. It is a different and equally sophisticated form of scientific thinking applied to organizations instead of experiments.",s:h(c,'strategy')*5+h(c,'data')*2+h(v,'financial')*3+h(v,'building')*2+(w==='leading'?3:0)},
    {id:'bridge_builder',name:'The Bridge Builder',tagline:'Connections that create real value',col:'#378ADD',desc:"You connect people, organizations, and ideas that would not have connected without you. Your value is not only what you know - it is what becomes possible when you are in the room. Scientific partnerships, licensing deals, collaborative consortia: these rarely happen on their own. They happen because someone with your instincts made them happen.",s:h(c,'partnerships')*5+h(c,'communication')*3+h(v,'impact')*2+(w==='stakeholders'?3:0)+(w==='small_team'?1:0)},
    {id:'knowledge_architect',name:'The Knowledge Architect',tagline:'Building frameworks others rely on',col:'#639922',desc:"You read broadly and synthesize deeply. Given a complex scientific landscape, you do not just summarize it - you map it, identify the gaps, and build frameworks that others can genuinely use. That is the foundation of outstanding scientific writing, rigorous policy analysis, and the kind of intellectual consulting that commands serious respect.",s:h(c,'synthesis')*5+h(c,'writing')*3+h(v,'intellectual')*3+h(v,'reputation')*2+(w==='independent'?2:0)},
    {id:'entrepreneur',name:'The Science Entrepreneur',tagline:'Risk is fuel, not obstacle',col:'#D85A30',desc:"You build things. Risk energizes rather than paralyzes you - you see opportunity where others see uncertainty. You are comfortable moving before all the information is in, and you understand intuitively that the biggest cost is often inaction. In a world that desperately needs founders who understand the science, that profile is genuinely rare.",s:h(v,'building')*4+(r==='bigswings'?4:0)+(r==='ambiguity'?3:0)+h(c,'strategy')*2+h(c,'partnerships')*2},
    {id:'research_orchestrator',name:'The Research Orchestrator',tagline:'Science, organized and led',col:'#534AB7',desc:"You orchestrate. Whether in academia or industry, your natural role is organizing people, resources, and timelines around scientific goals - and making sure the outcome is greater than the sum of its parts. Research managers, laboratory directors, and R&D program leaders: that is where your profile consistently produces its greatest impact.",s:(w==='leading'?5:0)+h(c,'ops')*3+h(v,'reputation')*2+h(v,'impact')*2+h(c,'partnerships')*2},
  ];
  return types.sort((a,b)=>b.s-a.s)[0];
}

    ms_excited:"You are in the best possible position: scientifically grounded enough to have real preferences, but early enough in your career that those preferences can still shape your direction. Researchers who explore their options at this level - rather than defaulting to the obvious next step - consistently end up in roles that fit better and that they sustain longer.",
    ms_comfortable:"The comfort of a known path is real, but so is the risk of optimizing for the familiar over the meaningful. Your degree has opened more doors than the academic system typically makes visible. This analysis is an invitation to look through more of them before you commit.",
    ms_change:"Deciding to pivot direction at this level is, strategically, one of the best moments to do it. Your technical skills are real, your scientific literacy is established, and the career equity you have built is far more portable than the standard narrative suggests.",
    ms_uncertain:"Uncertainty at this stage usually means one of two things: you have not yet found the option that genuinely fits, or you have seen enough of the landscape to know that the obvious answers are not satisfying. Both are worth investigating.",
    ms_clear:"Having clarity at this level is genuinely rare. What follows will help you sharpen that intuition and build the concrete roadmap to match it.",
    ps_excited:"There is a particular kind of PhD student who stays curious about the bigger picture even while running experiments - and they are usually the ones who end up doing the most interesting work, wherever they land. That intellectual restlessness you feel is not a distraction. It is a signal worth following.",
    ps_comfortable:"Midway through a PhD, it is easy to defer the question indefinitely. The lab is absorbing, the milestones are clear, and career exploration feels premature. But the researchers who navigate post-PhD transitions most successfully are almost always those who started thinking seriously about it two years before finishing.",
    ps_change:"Feeling ready for a change during a PhD is worth examining carefully - not to dismiss the feeling, but to understand precisely what is driving it. Is it the specific project? The academic culture? The mode of working? The answer to that question shapes everything that follows.",
    ps_uncertain:"PhD uncertainty often comes from being honest enough to see the academic system clearly and not yet finding a version of what comes after that fully resonates. That clarity about what you do not want is actually the beginning of figuring out what you do.",
    ps_clear:"Having a clear sense of direction during a PhD - and still being deliberate enough to pressure-test that clarity - is a sign of strong self-awareness. This analysis will either reinforce what you already sense or surface something you had not considered.",
    pg_excited:"Finishing a PhD and feeling genuinely excited rather than just relieved is not universal. If curiosity about what comes next is what is driving you forward, that is a strong signal about the kind of environment you will do your best work in.",
    pg_comfortable:"The post-PhD moment can feel deceptively settled - especially if a postdoc or familiar next step is in front of you. But the window between completing a PhD and committing to the next phase is one of the few genuinely open moments in a research career.",
    pg_change:"The decision to change direction after a PhD is one the academic system makes unnecessarily difficult. But researchers who make this transition deliberately and early consistently outperform those who drift. Your PhD-level skills are rare outside academia. Most employers have not been told how to find you - but they need you.",
    pg_uncertain:"Post-PhD uncertainty is, in many ways, the appropriate response to completing something that was designed to be deep and singular. What comes next genuinely has no obvious answer when you have just spent 4-5 years doing something without a natural continuation. This analysis is designed to help you build one.",
    pg_clear:"Finishing a PhD with clear direction is a significant advantage. The challenge at this stage is not knowing where you want to go - it is building the right bridge to get there efficiently, without unnecessary detours.",
    mg_excited:"Your degree is behind you, and the fact that you are still curious rather than just relieved tells you something important: your intellectual drive is not credential-dependent. That matters for what kind of work you will actually find fulfilling long-term.",
    mg_comfortable:"A completed degree and a comfortable sense of direction: solid foundations. But comfortable in career terms sometimes means not yet fully tested. This is a good moment to pressure-test that comfort and see what holds.",
    mg_change:"Wanting to pivot is more strategically sound than the academic world tends to acknowledge. The analytical skills, the scientific literacy, the research methodology - none of it is lost. All of it is more portable than you have probably been told.",
    mg_uncertain:"Uncertainty is often a sign that you have seen enough to know the landscape is complex, but not yet enough to know your place in it. That is a starting point, not a limitation.",
    mg_clear:"Clarity at this stage gives you something most people do not have: a head start. What follows is about converting that clarity into a concrete, executable strategy.",
    pd_excited:"Postdocs who remain genuinely curious about what comes next - rather than grinding toward one more paper - navigate career transitions better and faster than those who defer the question. The fact that you are actively exploring puts you measurably ahead.",
    pd_comfortable:"Postdoc comfort is a double-edged state. The research is engaging, the environment is familiar, and there is always one more paper before making a decision. This analysis is a deliberate prompt to actually make the decision - because the window of maximum optionality does not stay open indefinitely.",
    pd_change:"Deciding during a postdoc that the academic track is not the path takes courage - and a recognition that honesty usually produces better outcomes than persistence in the wrong direction. The skills you have accumulated at this level are genuinely rare outside academia, and largely invisible to you because you are surrounded by people who have the same ones.",
    pd_uncertain:"Postdoc uncertainty often comes from having seen the full academic machine up close - and having an honest reaction to what you found. If the PI track does not excite you the way it once did, that is data. This analysis is designed to help you interpret what that data means.",
    pd_clear:"Having clarity at the postdoc level - whether it points toward a PI position or toward something else - is the product of years of careful, close observation. The analysis that follows will help you build on that clarity rather than second-guess it.",
  };
  return m[`${e}_${s}`]||"You are at a pivotal moment in your research career, and the decisions you make now will shape the next decade significantly.";
}

function getStrengths(){
  const cats=[...state.cats],vals=[...state.values];
  const sp={bench:"hands-on technical expertise and the ability to generate reliable experimental data",design:"the capacity to design rigorous studies and choose the right methodological approaches",data:"fluency with quantitative analysis, statistics, and extracting signal from complex datasets",synthesis:"the ability to read across a field, connect disparate ideas, and build conceptual frameworks that others can use",writing:"the ability to communicate scientific ideas with precision, clarity, and authority",ops:"operational intelligence - the ability to build systems, ensure quality, and keep complex scientific programs on track",communication:"the gift for translating scientific complexity into insight that different audiences can actually act on",partnerships:"the instinct to build relationships and catalyze collaboration across different types of people and organizations",strategy:"strategic thinking - the ability to zoom out, read competitive landscapes, and identify where to invest effort"};
  const vp={intellectual:"driven by intellectual curiosity and the need for deep, autonomous thinking",impact:"motivated by real-world impact - the knowledge that your work connects to meaningful outcomes for actual people",financial:"clear-eyed about financial reward as a legitimate and meaningful dimension of career satisfaction",teaching:"energized by developing others - mentoring, teaching, and knowledge transfer are intrinsically rewarding to you",building:"a maker at heart - you want to build things, systems, or organizations that did not exist before",reputation:"motivated in part by scientific recognition and peer credibility",stability:"someone who performs best in environments with clear structures and predictable progression",balance:"deliberately oriented toward sustainability - you understand that the best careers are marathons, not sprints"};
  const topC=cats.slice(0,3).map(c=>sp[c]).filter(Boolean);
  const topV=vals.slice(0,2).map(v=>vp[v]).filter(Boolean);
  let t="Your scientific profile is built on ";
  if(topC.length===1)t+=topC[0];else if(topC.length===2)t+=`${topC[0]} and ${topC[1]}`;else t+=`${topC[0]}, ${topC[1]}, and ${topC[2]}`;
  t+=". ";
  if(topV.length>=1){t+=`At the level of values and motivation, you are ${topV[0]}`;if(topV.length>=2)t+=`, and ${topV[1]}`;t+=". ";}
  const c=state.cats;
  if(c.has('data')&&c.has('strategy'))t+="The combination of data fluency and strategic thinking is among the most commercially transferable profiles that comes out of research environments - it is the specific package that management consulting, life sciences strategy, and R&D leadership actively recruit for.";
  else if(c.has('bench')&&c.has('strategy'))t+="The combination of hands-on scientific depth and strategic thinking is unusual and genuinely valuable. You can operate credibly at the bench and in the boardroom - which opens leadership and advisory roles that purely technical or purely business-trained people cannot easily fill.";
  else if(c.has('data')&&c.has('communication'))t+="The combination of data fluency and communication effectiveness is rare - most researchers are strong in one or the other. It puts you in a category that can both generate insight and make it land with the people who need to act on it.";
  else if(c.has('writing')&&c.has('synthesis'))t+="Writing and synthesis together produce something specifically powerful: the ability to build knowledge frameworks and communicate them with authority. That is the foundation of great scientific writing, outstanding consulting work, and rigorous policy analysis.";
  else t+="This profile makes you effective in environments where scientific depth needs to connect with something beyond the lab - whether that is data systems, human relationships, ideas, or institutional strategy.";
  return t;
}

function getCareerFit(type){
  const goals=[...state.goals],ws=state.workstyle;
  const hasAcademic=goals.some(g=>['academia','postdoc','phd'].includes(g));
  const hasIndustry=goals.some(g=>['rd','industry','consulting','startup','policy'].includes(g));
  let t='';
  if(goals.includes('open')||(hasAcademic&&hasIndustry))t="The breadth of directions you are holding is not indecision - it is intellectual honesty about a genuinely complex landscape. Researchers who explore widely at this stage and then converge deliberately tend to end up in better-fit positions than those who narrowed too early. ";
  else if(goals.includes('phd'))t="The decision to pursue a PhD is worth making with the same rigor you would apply to any scientific question. The key variable is not the degree itself - it is the supervisor relationship and the scientific question you will spend years on. Both need to genuinely excite you. ";
  else if(goals.includes('postdoc'))t="A strategic postdoc is one where you are acquiring a specific capability or credential you do not currently have, that opens a specific door you genuinely want to open. If you cannot articulate that capability and that door clearly, the postdoc may be a deferral rather than a strategy. ";
  else if(hasAcademic&&!hasIndustry)t="Your gravitational pull toward academic and research environments is worth treating as real data rather than default inertia. The question is not whether academia is a good choice - it is whether it is the right fit for your specific profile, working style, and values. ";
  else if(!hasAcademic&&hasIndustry)t="Your orientation toward applied and industry environments places you in the middle of where the most interesting scientific work is increasingly being done. The line between real research and industry research has been dissolving for over a decade. ";
  const tins={deep_scientist:"Researchers with your profile - technically deep, intellectually driven, and most productive with focused time - need to be selective about environments. The best fits are institutions and companies that genuinely value deep expertise rather than just claiming to.",data_thinker:"Your data orientation combined with your scientific training gives you something the market genuinely needs more of: people who understand both the biology and the mathematics, not just one. Industry, consulting, and data-intensive academic environments are all undersupplied by candidates with your combination.",storyteller:"The ability to make science land with different audiences - at depth, not just through simplification - is one of the most consistently undervalued skills in the scientific world. Medical communications, science journalism, patient education, institutional communications, and educational content are all areas where your profile creates immediate value.",strategic_mind:"Your strategic orientation positions you well for roles at the intersection of scientific credibility and business decision-making. The scientific background is the credential; the strategic thinking is what you are actually being hired for.",bridge_builder:"What you bring to any role is the ability to make things happen that would not happen without you - licensing deals, collaborative projects, advisory relationships, funding conversations. That capability is specifically valuable in technology transfer, business development, and scientific account management.",knowledge_architect:"Your synthesis orientation is the foundation of some of the most intellectually rich careers in science: strategic intelligence, regulatory writing, policy analysis, scientific editing, grant development, and knowledge management.",entrepreneur:"Your tolerance for risk and your building orientation define someone who is either founding something, joining something early, or actively making a scientific organization function significantly better than it otherwise would.",research_orchestrator:"Your leadership and coordination orientation means your maximum impact comes not from contributing to a research program, but from running one - in academia, industry, or at a larger scientific organization."};
  t+=(tins[type.id]||'Your profile suggests strong fit with roles requiring scientific credibility paired with broader capabilities.')+' ';
  // Field-specific context
  const ftext={life_sci:"In life sciences specifically, the range of paths from academic research through biotech, pharma, medical communications, and science policy is broader than almost any other field - and the demand for scientifically credible people who can operate outside the lab has never been higher.",medicine:"Clinical research backgrounds are among the most directly transferable into pharma and CRO environments. Your understanding of patient populations, trial design, and regulatory logic is exactly what those organizations are actively recruiting for.",chemistry:"Chemistry backgrounds are remarkably versatile - from materials science startups to pharmaceutical R&D to regulatory affairs to technical consulting. The deep quantitative and experimental training transfers further than most chemistry PhDs realize.",physics:"Physics and engineering backgrounds carry a quantitative rigor that is highly valued in data science, financial modeling, technical consulting, and deep-tech startups - often more than domain-specific biology training.",cs_data:"Computer science and data backgrounds give you something increasingly rare in research: the ability to build the tools other scientists use. That positions you well in bioinformatics, health tech, AI-driven drug discovery, and scientific software.",env_sci:"Environmental science backgrounds connect naturally to science policy, sustainability consulting, NGO work, and impact-focused organizations - areas where scientific credibility and genuine values alignment are both required.",social:"Social science backgrounds carry specific value in health economics, behavioral science consulting, patient-centered research, and science communication - areas that need people who understand both the science and the human dimension.",math:"Mathematics and statistics backgrounds are among the most versatile in research. The demand for rigorous quantitative thinking spans industry R&D, financial modeling, data science, consulting, and policy analysis.",other:"Interdisciplinary backgrounds carry a specific advantage: the ability to bridge communities that do not usually talk to each other. That is the core skill in science communication, policy work, technology transfer, and consulting."};
  if(state.field&&ftext[state.field])t+=ftext[state.field]+' ';
  const wsa={independent:"Given that you do your best work with focused, uninterrupted time, that preference should be a genuine filter when evaluating roles - not an afterthought.",small_team:"The close-team working dynamic you prefer tends to be most consistently available in smaller organizations, specialist units, or early-stage ventures.",stakeholders:"Your comfort with client and stakeholder interaction is a specific differentiator in roles where most researchers find that dimension of the work draining.",leading:"Your leadership orientation will be most clearly expressed in roles where you are not just contributing to outcomes but coordinating the effort to produce them.",flexible:"Your adaptability across working modes is genuinely useful in environments that require researchers to shift between different contexts as the work evolves."};
  t+=(wsa[ws]||'');
  return t;
}

function getChallenge(){
  const r=state.risk,v=state.values;
  const rt={stable:"A preference for clear, stable paths can sometimes lead to optimizing for security over genuine fit. The most fulfilling careers are not always the most predictable ones - and some paths that initially look uncertain become substantially more stable once you understand them from the inside. The risk of not exploring is real, and it compounds over time.",moderate:"Moderate risk tolerance is the most adaptive position - enough stability to function, enough openness to evolve. The challenge is making sure moderate does not become a way of perpetually waiting for more certainty before deciding. At some point, every meaningful career move requires acting with incomplete information.",ambiguity:"Your comfort with ambiguity is a genuine asset - but in a career context, ambiguity can sometimes become a cover for avoiding the discomfort of committing. Open to everything eventually needs to become committed to something specific. This analysis is designed to help you find what that something is.",bigswings:"High risk tolerance is genuinely rare and valuable in specific contexts. Worth pairing it with honest self-assessment about what precisely you are willing to be uncertain about - income, geography, professional status, belonging to a peer community."};
  let t=rt[r]||'';
  const vi=[...v];
  if(vi.includes('intellectual')&&vi.includes('financial'))t+=" One specific tension worth naming honestly: intellectual freedom and strong financial reward are both legitimate priorities, but they pull in opposite directions in most research career paths. The careers that maximize intellectual autonomy tend to be structurally underpaid relative to the skill required. The sweet spot exists - typically in specialized consulting, senior industry roles with real technical focus, or well-funded research environments - but it requires deliberate seeking.";
  else if(vi.includes('stability')&&vi.includes('building'))t+=" You have identified both stability and building as important to you - worth sitting with, because they pull in opposite directions. The most interesting things to build tend to require the most tolerance for uncertainty. Being deliberate about which you are actually optimizing for will save you from significant disappointment.";
  else if(vi.includes('balance')&&vi.includes('impact'))t+=" The combination of meaningful work-life balance and significant real-world impact is worth thinking through honestly. The roles that deliver the largest measurable impact tend to make serious demands on time and energy, especially in their earlier phases.";
  else t+=" The most important thing to stress-test right now is the gap between what career paths look like from the outside and what they actually require on the inside. Informational interviews - real conversations with people already doing the work you are considering - are the single most efficient way to close that gap.";
  return t;
}

function getNextSteps(type){
  const e=state.edu,goals=[...state.goals];
  const steps=[];
  const es={ms:"Map the 3-5 roles you are most curious about and find one person doing each of them with a research background. Ask for a 20-minute conversation - not for advice, but to understand what the path actually looks like from the inside.",mg:"Spend 90 minutes rewriting your experience in the language of the field you are targeting - not your academic CV, but a version that translates what you have done into terms that field actually uses.",ps:"Talk to at least 3 researchers who completed PhDs in adjacent fields and went in the direction you are considering - not to ask what you should do, but to understand what the transition actually looked like and what surprised them.",pg:"Identify 5 specific organizations doing work you find genuinely interesting. Research each one specifically: their pipelines, their recent hires, their scientific agenda. Targeted applications from people who understand what a specific organization is building get through filters that generic ones do not.",pd:"Your most urgent task is probably not applying to more roles - it is translating your specific research experience into language that non-academic hiring managers can evaluate. Draft a one-page summary of what you have done and what it enables you to do, in plain language."};
  steps.push(es[e]||"Map your target roles and start having real conversations with people already doing them.");
  if(goals.includes('startup'))steps.push("Before fundraising or incorporating anything: write a 300-word problem statement for the scientific challenge you want to address. Not a solution, not a business plan - a problem. If you cannot write it clearly, the idea is not ready yet. If you can, you have the beginning of a credible pitch.");
  else if(goals.includes('phd'))steps.push("If a PhD is genuinely where you are headed, spend real time identifying supervisors whose scientific questions excite you - not just whose labs have funding or reputation. The supervisor relationship is the single most consequential variable in PhD success and what your career looks like afterward.");
  else if(goals.includes('postdoc'))steps.push("A strategic postdoc is one where you are acquiring a specific capability that opens a specific door you want to open. If you cannot articulate what that capability is and what that door is, the postdoc is likely a deferral rather than a strategy.");
  else if(goals.includes('academia'))steps.push("If the academic track is genuinely where you are heading, backward-plan from the specific positions you want: which publications would make you competitive, at which kinds of departments, under which conditions. Knowing the rules explicitly beats discovering them by accident during your postdoc.");
  else if(goals.includes('consulting'))steps.push("Entry into life sciences consulting with a research background is most efficient when you target firms with active practices in your scientific domain. Research the specific practice areas at 5-6 firms and make the connection explicit in your application.");
  else if(goals.includes('policy'))steps.push("Science policy has specific entry points that vary by geography: parliamentary science fellowships, government science advisor programs, think tank positions. Identify 3 programs most relevant to your country and field, and understand their application windows - most require planning 6-12 months ahead.");
  else if(goals.includes('rd'))steps.push("Industry R&D applications from academia succeed when they are specific: the company's pipeline connects to your research experience, and you have made that connection explicit. Before applying to any role, spend 20 minutes understanding what that specific company is building - then show them exactly why your background is relevant.");
  else steps.push("Before writing a single application: write one paragraph describing the work you want to be doing in 5 years. Make it specific enough that a stranger could read it and understand what you mean. If you cannot write it yet, that is the signal that more exploration is needed first.");
  steps.push("Find your scientific field's most active professional community - a Slack group, LinkedIn network, professional society, or niche conference - and identify 5 people whose career trajectories look like what you want yours to look like in 10 years. Follow their work. Engage with it genuinely.");
  const ts={deep_scientist:"Be explicit with yourself about what kind of scientific environment you actually thrive in - not what you think you should want, but what your experience tells you. Environment fit is not a luxury - it is a performance requirement.",data_thinker:"Build a visible portfolio of data work that demonstrates your capabilities outside a purely academic context. GitHub, Kaggle, a personal analytics project - these signal competence in ways that publications alone do not.",storyteller:"Start writing publicly, if you have not already. A consistent body of accessible scientific writing - a newsletter, a column, a blog - is one of the most direct signals you can send to organizations that hire science communicators.",strategic_mind:"Develop a point of view on a specific strategic question in your scientific domain: a market that is underserved, a technology that has been overvalued. Consultants and strategy teams hire people with perspectives, not just knowledge.",bridge_builder:"Your value is most visible when you are actively making connections happen - not just when you say you could. Before your next career conversation, identify two people in different parts of your field who should know each other and introduce them.",knowledge_architect:"Develop one piece of synthesis work that would be genuinely useful to someone outside academia: a landscape analysis, a systematic review of an emerging area. Put it where people can find it.",entrepreneur:"Talk to 3 founders with scientific backgrounds - not famous ones, but people who are 2-4 years into building something in your domain. Ask specifically what they wish they had known at the stage you are currently at.",research_orchestrator:"Actively seek opportunities to coordinate something - a lab meeting series, a collaborative project, a training program - before you are officially given the role to do so. Research leaders who get early opportunities are almost always the ones who started leading informally first."};
  steps.push(ts[type.id]||"Build one concrete piece of work that makes your capabilities visible to the people you want to work with.");
  return steps.slice(0,4);
}

function scoreJobs(){
  const ur=ER[state.edu]||0;
  const hasOpen=state.goals.has('open');
  return JOBS.map(j=>{
    const mc=j.c.filter(c=>state.cats.has(c));
    if(!mc.length)return{...j,score:0,mc};
    const ss=(mc.length/j.c.length)*60;
    const matchGoal=j.g.some(g=>state.goals.has(g));
    const gs=(matchGoal||hasOpen)?25:(j.g.includes('open')&&state.goals.size>0?5:0);
    const es=ur>=j.e?10:Math.max(0,10-(j.e-ur)*5);
    let vb=0;
    if(state.values.has('intellectual')&&j.s==='Academia')vb+=4;
    if(state.values.has('financial')&&(j.s==='Finance & VC'||j.s==='Consulting'))vb+=4;
    if(state.values.has('teaching')&&(j.c.includes('communication')||j.s==='Academia'))vb+=3;
    if(state.values.has('building')&&j.g.includes('startup'))vb+=4;
    if(state.values.has('stability')&&(j.s==='Academia'||j.s==='Operations'))vb+=2;
    return{...j,score:Math.round(ss+gs+es+vb),mc};
  }).sort((a,b)=>b.score-a.score).filter(j=>j.score>15);
}

function loadingHTML(){return`<div class="loading-screen">

  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
</div>`;}

function startLoading(){
  let i=0,pct=0;
  const mi=setInterval(()=>{i=Math.min(i+1,MSGS.length-1);const el=document.getElementById('load-msg');if(el)el.textContent=MSGS[i];},380);
  const bi=setInterval(()=>{pct=Math.min(pct+4,94);const el=document.getElementById('load-bar');if(el)el.style.width=pct+'%';},80);
  setTimeout(()=>{clearInterval(mi);clearInterval(bi);const el=document.getElementById('load-bar');if(el)el.style.width='100%';setTimeout(()=>{state.loading=false;render();},200);},2400);
}

function animateNum(id,target){const el=document.getElementById(id);if(!el)return;let n=0;const s=Math.max(1,Math.ceil(target/28));const t=setInterval(()=>{n=Math.min(n+s,target);el.textContent=n;if(n>=target)clearInterval(t);},28);}

function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=document.getElementById('copy-btn');if(btn){btn.textContent='Copied!';setTimeout(()=>{if(btn)btn.textContent='Copy link';},2000);}
  }).catch(()=>{});
}

function tog(head){const jb=head.closest('.jc-inner').querySelector('.jb');const chv=head.querySelector('.chv');if(jb)jb.classList.toggle('open');if(chv)chv.classList.toggle('open');}
function restart(){state={step:-1,edu:null,field:null,satisfaction:null,goals:new Set(),cats:new Set(),values:new Set(),workstyle:null,risk:null,shareOpen:false,filter:'All',dir:1,loading:false};render();}

function render(){
  renderProg();
  const a=document.getElementById('app');
  if(state.step<0)a.innerHTML=heroHTML();
  else if(state.loading){a.innerHTML=loadingHTML();startLoading();}
  else if(state.step===0)a.innerHTML=eduHTML();
  else if(state.step===1)a.innerHTML=fieldHTML();
  else if(state.step===2)a.innerHTML=satHTML();
  else if(state.step===3)a.innerHTML=goalHTML();
  else if(state.step===4)a.innerHTML=skillsHTML();
  else if(state.step===5)a.innerHTML=valuesHTML();
  else if(state.step===6)a.innerHTML=workRiskHTML();
  else{a.innerHTML=resultsHTML();requestAnimationFrame(()=>animateNum('res-count',scoreJobs().length));}
  a.innerHTML=a.innerHTML.replace(/—/g,' - ');
  bind();
  if(state.step===7)document.querySelectorAll('.jc').forEach((el,i)=>{el.style.animationDelay=`${i*13}ms`;});
  // Email form
  document.getElementById('email-form')?.addEventListener('submit',async(e)=>{
    e.preventDefault();
    const email=document.getElementById('email-input').value;
    const btn=e.target.querySelector('button');
    btn.textContent='Sending...';btn.disabled=true;
    try{
      await fetch('https://formspree.io/f/REPLACE_WITH_YOUR_FORM_ID',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,profile:getProfileType().name,field:state.field,edu:state.edu,goals:[...state.goals].join(',')})});
      const sec=document.getElementById('email-section');
      if(sec)sec.innerHTML='<p class="email-success">You are in. Welcome to the community - see you in your inbox.</p>';
    }catch{btn.textContent='Send it';btn.disabled=false;}
  });
}

function bind(){
  const s=document.getElementById('start-btn');if(s)s.addEventListener('click',()=>{state.dir=1;state.step=0;render();});
  document.querySelectorAll('[data-edu]').forEach(el=>el.addEventListener('click',()=>{state.edu=el.dataset.edu;render();}));
  document.querySelectorAll('[data-field]').forEach(el=>el.addEventListener('click',()=>{state.field=el.dataset.field;render();}));
  document.querySelectorAll('[data-sat]').forEach(el=>el.addEventListener('click',()=>{state.satisfaction=el.dataset.sat;render();}));
  document.querySelectorAll('[data-goal]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.goal;state.goals.has(id)?state.goals.delete(id):state.goals.add(id);render();}));
  document.querySelectorAll('[data-cat]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.cat;state.cats.has(id)?state.cats.delete(id):state.cats.add(id);render();}));
  document.querySelectorAll('[data-val]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.val;state.values.has(id)?state.values.delete(id):state.values.add(id);render();}));
  document.querySelectorAll('[data-ws]').forEach(el=>el.addEventListener('click',()=>{state.workstyle=el.dataset.ws;render();}));
  document.querySelectorAll('[data-rk]').forEach(el=>el.addEventListener('click',()=>{state.risk=el.dataset.rk;render();}));
  document.querySelectorAll('[data-f]').forEach(el=>el.addEventListener('click',()=>{state.filter=el.dataset.f;render();}));
  const n=document.getElementById('nxt');if(n)n.addEventListener('click',()=>{if(state.step===6){state.loading=true;state.step=7;}else{state.dir=1;state.step++;}render();});
  const b=document.getElementById('bck');if(b)b.addEventListener('click',()=>{state.dir=-1;state.step--;render();});
}

document.addEventListener('keydown',e=>{
  if(state.step<0||state.step>6)return;
  const multiSteps={3:GOALS,4:null,5:VALUES};
  const singleMaps={0:EDU,1:FIELDS,2:SATISFACTION};
  if(singleMaps[state.step]){
    const items=singleMaps[state.step];
    const idx=KEYS.toLowerCase().indexOf(e.key.toLowerCase());
    if(idx>=0&&idx<items.length){
      if(state.step===0)state.edu=items[idx].id;
      else if(state.step===1)state.field=items[idx].id;
      else if(state.step===2)state.satisfaction=items[idx].id;
      render();return;
    }
    if(e.key==='Enter'&&[state.edu,state.field,state.satisfaction][state.step]){state.dir=1;state.step++;render();}
  } else if(state.step===3){
    const idx=KEYS.toLowerCase().indexOf(e.key.toLowerCase());
    if(idx>=0&&idx<GOALS.length){const id=GOALS[idx].id;state.goals.has(id)?state.goals.delete(id):state.goals.add(id);render();return;}
    if(e.key==='Enter'&&state.goals.size>0){state.dir=1;state.step++;render();}
  } else if(state.step===4){
    if(e.key==='Enter'&&state.cats.size>0){state.dir=1;state.step++;render();}
  } else if(state.step===5){
    const idx=KEYS.toLowerCase().indexOf(e.key.toLowerCase());
    if(idx>=0&&idx<VALUES.length){const id=VALUES[idx].id;state.values.has(id)?state.values.delete(id):state.values.add(id);render();return;}
    if(e.key==='Enter'&&state.values.size>0){state.dir=1;state.step++;render();}
  } else if(state.step===6){
    if(e.key==='Enter'&&state.workstyle&&state.risk){state.loading=true;state.step=7;render();}
  }
});
render();
</script>
