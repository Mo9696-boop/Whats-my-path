<style>

.ps.done,.ps.active{background:#1D9E75}
.step{animation:slideR .3s cubic-bezier(.25,.46,.45,.94) both}

.opt-list{display:flex;flex-direction:column;gap:9px;margin-bottom:1rem}

.kb-hint{font-size:11px;color:var(--color-text-secondary);margin-top:.5rem;text-align:right;opacity:.7}

.btn{padding:12px 26px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:7px;font-family:'Space Grotesk',var(--font-sans)}

.selcount{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-secondary);margin-top:1rem}

.hint-t{font-size:12px;color:var(--color-text-secondary);margin-top:1rem;text-align:right}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;text-align:center;animation:fadeUp .3s ease}
.spin-wrap{position:relative;width:72px;height:72px;margin-bottom:2rem}
.spin-ring{position:absolute;inset:0;border:3px solid var(--color-border-tertiary);border-top-color:#1D9E75;border-radius:50%;animation:spin .85s linear infinite}

.load-title{font-size:24px;font-weight:700;color:var(--color-text-primary);letter-spacing:-.4px;margin-bottom:.75rem}

  const cats=[...state.cats],vals=[...state.values];

  const vp={intellectual:"driven by intellectual curiosity and the need for deep, autonomous thinking",impact:"motivated by real-world impact — the knowledge that your work connects to meaningful outcomes for actual people",financial:"clear-eyed about financial reward as a legitimate and meaningful dimension of career satisfaction",teaching:"energized by developing others — mentoring, teaching, and knowledge transfer are intrinsically rewarding to you, not secondary obligations",building:"a maker at heart — you want to build things, systems, or organizations that did not exist before",reputation:"motivated in part by scientific recognition and peer credibility — reputation within your field matters to you",stability:"someone who performs best in environments with clear structures and predictable progression",balance:"deliberately oriented toward sustainability — you understand that the best careers are marathons, not sprints"};
  const topC=cats.slice(0,3).map(c=>sp[c]).filter(Boolean);
  const topV=vals.slice(0,2).map(v=>vp[v]).filter(Boolean);
  let t="Your scientific profile is built on ";
  if(topC.length===1)t+=topC[0];
  else if(topC.length===2)t+=`${topC[0]} and ${topC[1]}`;
  else t+=`${topC[0]}, ${topC[1]}, and ${topC[2]}`;
  t+=". ";
  if(topV.length>=1){t+=`At the level of values and motivation, you are ${topV[0]}`;if(topV.length>=2)t+=`, and ${topV[1]}`;t+=". ";}
  const c=state.cats;
  if(c.has('data')&&c.has('strategy'))t+="The combination of data fluency and strategic thinking is among the most commercially transferable profiles that comes out of research environments — it is the specific package that management consulting, life sciences strategy, and R&D leadership actively recruit for.";
  else if(c.has('bench')&&c.has('strategy'))t+="The combination of hands-on scientific depth and strategic thinking is unusual and genuinely valuable. You can operate credibly at the bench and in the boardroom — which opens leadership and advisory roles that purely technical or purely business-trained people cannot easily fill.";
  else if(c.has('data')&&c.has('communication'))t+="The combination of data fluency and communication effectiveness is rare — most researchers are strong in one or the other. It puts you in a category that can both generate insight and make it land with the people who need to act on it. That double capability is specifically what many high-value roles require.";
  else if(c.has('writing')&&c.has('synthesis'))t+="Writing and synthesis are individually common in research — but the combination produces something specifically powerful: the ability to build knowledge frameworks and communicate them with authority. That is the foundation of great scientific writing, outstanding consulting work, and rigorous policy analysis.";
  else if(c.has('bench')&&c.has('communication'))t+="The combination of hands-on technical expertise and communication effectiveness is what the best field scientists, clinical specialists, and science educators share — and what makes them genuinely trusted by their audiences in ways that purely technical profiles often are not.";
  else t+="This profile makes you effective in environments where scientific depth needs to connect with something beyond the lab — whether that is data systems, human relationships, ideas, or institutional strategy.";
  return t;
}

function getCareerFit(type){
  const goals=[...state.goals],ws=state.workstyle;
  const hasAcademic=goals.some(g=>['academia','postdoc','phd'].includes(g));
  const hasIndustry=goals.some(g=>['rd','industry','consulting','startup','policy'].includes(g));
  let t='';
  if(goals.includes('open')||(hasAcademic&&hasIndustry))t="The breadth of directions you are holding is not indecision — it is intellectual honesty about a genuinely complex landscape. Researchers who explore widely at this stage and then converge deliberately tend to end up in better-fit positions than those who narrowed too early. ";
  else if(goals.includes('phd'))t="The decision to pursue a PhD is worth making with the same rigor you would apply to any scientific question. The key variable is not the degree itself — it is the supervisor relationship and the scientific question you will spend years on. Both need to genuinely excite you, because they will define the next 4-5 years of your professional life. ";
  else if(goals.includes('postdoc'))t="A strategic postdoc is one where you are acquiring a specific capability or credential you do not currently have, that opens a specific door you genuinely want to open. If you cannot articulate that capability and that door clearly, the postdoc may be a deferral rather than a strategy — and that distinction matters in three years. ";
  else if(hasAcademic&&!hasIndustry)t="Your gravitational pull toward academic and research environments is worth treating as real data rather than default inertia. The question is not whether academia is a good choice in the abstract — it is whether it is the right fit for your specific profile, working style, and values as they actually are. ";
  else if(!hasAcademic&&hasIndustry)t="Your orientation toward applied and industry environments places you in the middle of where the most interesting scientific work is increasingly being done. The line between real research and industry research has been dissolving for over a decade — and many of the most consequential breakthroughs now come from exactly the kind of environments you are drawn to. ";
  else if(goals.includes('scicomm'))t="Science communication is both more accessible and more competitive than it appears from the outside. The people who break in and sustain careers in this space are almost always those with genuine scientific depth combined with a writing or media practice they have already started building independently. ";
  const tins={
    deep_scientist:"Researchers with your profile — technically deep, intellectually driven, and most productive with focused time — need to be selective about environments. The best fits are institutions and companies that genuinely value deep expertise rather than just claiming to. That includes some academic settings, some industry research positions, and specialist technical roles in organizations that understand the difference between a scientist and a technician.",
    data_thinker:"Your data orientation combined with your scientific training gives you something the market genuinely needs more of: people who understand both the biology and the mathematics, not just one. Industry, consulting, and data-intensive academic environments are all undersupplied by candidates with your combination.",
    storyteller:"The ability to make science land with different audiences — at depth, not just through simplification — is one of the most consistently undervalued skills in the scientific world. Medical communications, science journalism, patient education, institutional communications, and educational content are all areas where your profile creates immediate value.",
    strategic_mind:"Your strategic orientation positions you well for roles at the intersection of scientific credibility and business decision-making. The scientific background is the credential; the strategic thinking is what you are actually being hired for — in consulting, business development, portfolio management, and senior industry leadership.",
    bridge_builder:"What you bring to any role is the ability to make things happen that would not happen without you — licensing deals, collaborative projects, advisory relationships, funding conversations. That capability is specifically valuable in technology transfer, business development, clinical partnerships, and scientific account management.",
    knowledge_architect:"Your synthesis orientation is the foundation of some of the most intellectually rich careers in science: strategic intelligence, regulatory writing, policy analysis, scientific editing, grant development, and knowledge management. The common thread is the transformation of complexity into usable, actionable frameworks.",
    entrepreneur:"Your tolerance for risk and your building orientation define someone who is either founding something, joining something early, or actively making a scientific organization function significantly better than it otherwise would. The question is finding the specific problem worth that level of commitment.",
    research_orchestrator:"Your leadership and coordination orientation means your maximum impact comes not from contributing to a research program, but from running one — in academia, industry, or at a larger scientific organization.",
  };
  t+=(tins[type.id]||'Your profile suggests strong fit with roles requiring scientific credibility paired with broader capabilities.')+' ';
  const wsa={independent:"Given that you do your best work with focused, uninterrupted time, that preference should be a genuine filter when evaluating roles — not an afterthought. Environments that require constant context-switching, meeting-heavy cultures, or open-plan offices tend to actively disadvantage profiles like yours.",small_team:"The close-team working dynamic you prefer tends to be most consistently available in smaller organizations, specialist units, or early-stage ventures — worth factoring into how you compare large-company versus boutique or startup environments.",stakeholders:"Your comfort with client and stakeholder interaction is a specific differentiator in roles where most researchers find that dimension of the work draining. It significantly expands your viable options into client-facing scientific and advisory roles.",leading:"Your leadership orientation will be most clearly expressed in roles where you are not just contributing to outcomes but coordinating the effort to produce them. Look deliberately for roles with people-management responsibility, not just technical ownership.",flexible:"Your adaptability across working modes — deep focus, collaboration, stakeholder engagement — is genuinely useful in environments that require researchers to shift between different contexts as the work evolves."};
  t+=(wsa[ws]||'');
  return t;
}

function getChallenge(){
  const r=state.risk,v=state.values;
  const rt={stable:"A preference for clear, stable paths can sometimes lead to optimizing for security over genuine fit. The most fulfilling careers are not always the most predictable ones — and some paths that initially look uncertain become substantially more stable once you understand them from the inside. The risk of not exploring is real, and it compounds over time.",moderate:"Moderate risk tolerance is the most adaptive position — enough stability to function, enough openness to evolve. The challenge is making sure moderate does not become a way of perpetually waiting for more certainty before deciding. At some point, every meaningful career move requires acting with incomplete information.",ambiguity:"Your comfort with ambiguity is a genuine asset — but in a career context, ambiguity can sometimes become a cover for avoiding the discomfort of committing. Open to everything eventually needs to become committed to something specific. This analysis is designed to help you find what that something is.",bigswings:"High risk tolerance is genuinely rare and valuable in specific contexts. Worth pairing it with honest self-assessment about what precisely you are willing to be uncertain about — income, geography, professional status, belonging to a peer community. High risk, high reward covers a very wide range of actual lived experiences."};
  let t=rt[r]||'';
  const vi=[...v];
  if(vi.includes('intellectual')&&vi.includes('financial'))t+=" One specific tension worth naming honestly: intellectual freedom and strong financial reward are both legitimate priorities, but they pull in opposite directions in most research career paths. The careers that maximize intellectual autonomy tend to be structurally underpaid relative to the skill required. The careers that pay well tend to constrain intellectual freedom. The sweet spot exists — typically in specialized consulting, senior industry roles with real technical focus, or well-funded research environments — but it requires deliberate seeking.";
  else if(vi.includes('stability')&&vi.includes('building'))t+=" You have identified both stability and building as important to you — worth sitting with, because they pull in opposite directions. The most interesting things to build tend to require the most tolerance for uncertainty. Being deliberate about which you are actually optimizing for in any given role will save you from significant disappointment.";
  else if(vi.includes('balance')&&vi.includes('impact'))t+=" The combination of meaningful work-life balance and significant real-world impact is worth thinking through honestly. The roles that deliver the largest measurable impact tend to make serious demands on time and energy, especially in their earlier phases. That does not make the combination impossible, but it requires being specific about which version of each you are actually comparing.";
  else if(vi.includes('reputation')&&vi.includes('impact'))t+=" Scientific reputation and real-world impact are both legitimate motivators — but they do not always move together. Some of the highest-impact work in research generates real-world change with limited academic visibility. Being clear on which matters more to you in practice will help you evaluate options more honestly.";
  else t+=" The most important thing to stress-test right now is the gap between what career paths look like from the outside and what they actually require on the inside. Informational interviews — real conversations with people already doing the work you are considering — are the single most efficient way to close that gap before committing to a direction.";
  return t;
}

function getNextSteps(type){
  const e=state.edu,goals=[...state.goals];
  const steps=[];
  const es={ms:"Map the 3-5 roles you are most curious about and find one person doing each of them with a research background. Ask for a 20-minute conversation — not for advice, but to understand what the path actually looks like from the inside. You will learn more from five real conversations than from months of online research.",mg:"Spend 90 minutes rewriting your experience in the language of the field you are targeting — not your academic CV, but a version that translates what you have done into terms that field actually uses. The gap between what you have done and what hiring managers are looking for is usually much smaller than it appears.",ps:"Talk to at least three researchers who completed PhDs in adjacent fields and went in the direction you are considering — not to ask what you should do, but to understand what the transition actually looked like, what surprised them, and what they would do differently.",pg:"Identify five specific companies, institutions, or organizations doing work you find genuinely interesting. Research each one specifically: their pipelines, their recent hires, their scientific agenda. Targeted applications from people who understand what a specific organization is actually building get through filters that generic applications do not.",pd:"Your most urgent task is probably not applying to more roles — it is translating your specific research experience into language that non-academic hiring managers can evaluate. Draft a one-page summary of what you have done and what it enables you to do, in plain language. Send it to someone outside your field. If they follow it, you are ready to use it."};
  steps.push(es[e]||"Map your target roles and start having real conversations with people already doing them.");
  if(goals.includes('startup'))steps.push("Before fundraising or incorporating anything: write a 300-word problem statement for the scientific challenge you want to address. Not a solution, not a business plan — a problem. If you cannot write it clearly, the idea is not ready. If you can, you have the beginning of a credible pitch.");
  else if(goals.includes('phd'))steps.push("If a PhD is genuinely where you are headed, spend real time identifying supervisors whose scientific questions excite you — not just whose labs have funding or reputation. The supervisor relationship is the single most consequential variable in PhD success, completion, and what your career looks like afterward. Apply to the person, not the institution.");
  else if(goals.includes('postdoc'))steps.push("A strategic postdoc is one where you are acquiring a specific capability or credential you do not currently have, that opens a specific door you want to open. If you cannot articulate what that capability is and what that door is, the postdoc is likely a deferral rather than a strategy — and that distinction matters for how you will feel about it in three years.");
  else if(goals.includes('academia'))steps.push("If the academic track is genuinely where you are heading, backward-plan from the specific positions you want: which publications would make you competitive, at which kinds of departments, under which conditions. The PI track is a specific game with specific rules — knowing them explicitly beats discovering them by accident during your postdoc.");
  else if(goals.includes('consulting'))steps.push("Entry into life sciences consulting with a research background is most efficient when you target firms with active practices in your scientific domain. Research the specific practice areas at five to six firms, identify their recent engagements in your field, and make the connection explicit in your application. The generic consulting track was not designed for research PhDs.");
  else if(goals.includes('policy'))steps.push("Science policy has specific entry points that vary by geography: parliamentary science fellowships, government science advisor programs, think tank positions, and intergovernmental organization secondments. Identify three programs most relevant to your country and field, and understand their application windows — most require planning 6-12 months ahead.");
  else if(goals.includes('rd'))steps.push("Industry R&D applications from academia succeed when they are specific: the company's pipeline connects to your research experience, and you have made that connection explicit. Before applying to any role, spend 20 minutes understanding what that specific company is trying to build — then show them exactly why your background is relevant to that specific challenge.");
  else steps.push("Before writing a single application: write one paragraph describing the work you want to be doing in five years. Make it specific enough that a stranger could read it and understand what you mean. If you cannot write it yet, that is the signal that more exploration is needed first — and that is useful information.");
  steps.push("Find your scientific field's most active professional community — a Slack group, LinkedIn network, professional society, or subject-specific conference — and identify five people whose career trajectories look like what you want yours to look like in ten years. Follow their work. Engage with it genuinely. The career conversations that actually move things forward rarely start with a cold application.");
  const ts={deep_scientist:"Be explicit with yourself about what kind of scientific environment you actually thrive in — not what you think you should want, but what your experience tells you. The researchers who force themselves into high-pressure, fast-paced environments when they genuinely need depth and focus rarely do their best work there. Environment fit is not a luxury — it is a performance requirement.",data_thinker:"Build a visible portfolio of data work that demonstrates your capabilities outside a purely academic context. GitHub, Kaggle, a personal analytics project, open-source scientific tools — these signal competence in ways that publications alone do not, especially to industry hiring managers who do not know how to read an academic publication list.",storyteller:"Start writing publicly, if you have not already. A consistent body of accessible scientific writing — a newsletter, a column, a blog — is one of the most direct signals you can send to organizations that hire science communicators and medical writers. It also builds an audience, which is genuine currency in this space.",strategic_mind:"Develop a point of view on a specific strategic question in your scientific domain: a market that is underserved, a technology that has been overvalued, a regulatory shift that most people have not fully processed. Consultants and strategy teams hire people with perspectives, not just knowledge.",bridge_builder:"Your value is most visible when you are actively making connections happen — not just when you say you could. Before your next career conversation, identify two people in different parts of your field who should know each other and introduce them. That action, repeated deliberately, is how your network becomes your most professionally visible asset.",knowledge_architect:"Develop one piece of synthesis work that would be genuinely useful to someone outside academia: a landscape analysis, a systematic review of an emerging area, a guide to a complex regulatory framework. Put it where people can find it. Career conversations that come from visible intellectual work are consistently better than those that come from cold applications.",entrepreneur:"Talk to three founders with scientific backgrounds — not famous ones, but people who are two to four years into building something in your domain. Ask specifically what they wish they had known at the stage you are currently at. The gap between the founding narrative and the actual experience is information that genuinely changes decisions.",research_orchestrator:"Actively seek opportunities to coordinate something — a lab meeting series, a collaborative project, a training program, a conference session — before you are officially given the role to do so. Research leaders who get early opportunities are almost always the ones who started leading informally first."};
  steps.push(ts[type.id]||"Build one concrete piece of work — a portfolio item, a project, a piece of writing — that makes your capabilities visible to the people you want to work with.");
  return steps.slice(0,4);
}

function scoreJobs(){
  const ur=ER[state.edu]||0;
  const hasOpen=state.goals.has('open');
  return JOBS.map(j=>{
    const mc=j.c.filter(c=>state.cats.has(c));
    if(!mc.length)return{...j,score:0,mc};
    const ss=(mc.length/j.c.length)*60;
    const matchGoal=j.g.some(g=>state.goals.has(g));
    const gs=(matchGoal||hasOpen)?25:(j.g.includes('open')&&state.goals.size>0?5:0);
    const es=ur>=j.e?10:Math.max(0,10-(j.e-ur)*5);
    let vb=0;
    if(state.values.has('intellectual')&&j.s==='Academia')vb+=4;
    if(state.values.has('financial')&&(j.s==='Finance & VC'||j.s==='Consulting'))vb+=4;
    if(state.values.has('teaching')&&(j.c.includes('communication')||j.s==='Academia'))vb+=3;
    if(state.values.has('building')&&j.g.includes('startup'))vb+=4;
    if(state.values.has('stability')&&(j.s==='Academia'||j.s==='Operations'))vb+=2;
    return{...j,score:Math.round(ss+gs+es+vb),mc};
  }).sort((a,b)=>b.score-a.score).filter(j=>j.score>15);
}

function ring(s){const r=16,circ=2*Math.PI*r,d=(circ*(s/100)).toFixed(1);return`<div class="sring"><svg viewBox="0 0 42 42"><circle cx="21" cy="21" r="${r}" fill="none" stroke="var(--color-border-tertiary)" stroke-width="2.5"/><circle cx="21" cy="21" r="${r}" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-dasharray="${d} ${circ.toFixed(1)}" stroke-linecap="round"/></svg><div class="sring-n">${s}%</div></div>`;}

  return`<div class="step${state.dir<0?' back':''}">
  <div class="step-ey">Question 6 of 6</div>
  <h2 class="st">Finally — how do you work and relate to risk?</h2>
  <p class="ss">Two quick things. These will shape both your profile type and the honest assessment in your results.</p>
  <div style="margin-bottom:1.75rem">
    <div class="combo-lbl">How do you work best?</div>
    ${optList(WORKSTYLE,'ws',state.workstyle)}
  </div>
  <div>
    <div class="combo-lbl">Your relationship with uncertainty and risk?</div>
    ${optList(RISK,'rk',state.risk)}
  </div>
  <div class="btnrow" style="margin-top:1.5rem"><button class="btn" id="bck">${svgB} Back</button><button class="btn btn-p" id="nxt" ${!ok?'disabled':''}>Build my career map ${svgA}</button></div>
</div>`;}

const MSGS=['Analyzing your 6 responses...','Building your researcher profile...','Matching career paths...','Writing your personal analysis...','Almost ready...'];

function loadingHTML(){return`<div class="loading-screen">
  <div class="spin-wrap"><div class="spin-ring"></div><div class="spin-inner"></div></div>
  <div class="load-title">Building your career map...</div>
  <div class="load-msg" id="load-msg">${MSGS[0]}</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
</div>`;}

function startLoading(){
  let i=0,pct=0;
  const mi=setInterval(()=>{i=Math.min(i+1,MSGS.length-1);const el=document.getElementById('load-msg');if(el)el.textContent=MSGS[i];},400);
  const bi=setInterval(()=>{pct=Math.min(pct+4,94);const el=document.getElementById('load-bar');if(el)el.style.width=pct+'%';},80);
  setTimeout(()=>{clearInterval(mi);clearInterval(bi);const el=document.getElementById('load-bar');if(el)el.style.width='100%';setTimeout(()=>{state.loading=false;render();},200);},2200);
}

function animateNum(id,target){
  const el=document.getElementById(id);if(!el)return;
  let n=0;const s=Math.max(1,Math.ceil(target/28));
  const t=setInterval(()=>{n=Math.min(n+s,target);el.textContent=n;if(n>=target)clearInterval(t);},28);
}

function resultsHTML(){
  const type=getProfileType();
  const all=scoreJobs();
  const shown=state.filter==='All'?all:all.filter(j=>j.s===state.filter);
  const cnames=[...state.cats].map(cl);
  const glabels=[...state.goals].map(id=>GOALS.find(g=>g.id===id)?.l).filter(Boolean).join(' · ');
  const elabel=EDU.find(e=>e.id===state.edu)?.l||'';
  const steps=getNextSteps(type);
  const opening=getOpening();
  const strengths=getStrengths();
  const careerFit=getCareerFit(type);
  const challenge=getChallenge();
  return`<div class="step${state.dir<0?' back':''}">

  <div class="profile-card" style="background:${type.col}">
    <div class="profile-label" style="color:rgba(255,255,255,.65)">Your researcher profile</div>
    <div class="profile-name" style="color:white">${type.name}</div>
    <div class="profile-tagline" style="color:rgba(255,255,255,.8)">${type.tagline}</div>
    <div class="profile-desc" style="color:rgba(255,255,255,.76)">${type.desc}</div>
  </div>

  <div class="analysis-block">
    <div class="analysis-ey">Where you are coming from</div>
    <p class="analysis-para">${opening}</p>
  </div>

  <div class="analysis-block">
    <div class="analysis-ey">What makes you distinctly you</div>
    <p class="analysis-para">${strengths}</p>
  </div>

  <div class="analysis-block">
    <div class="analysis-ey">Why these career paths fit your profile</div>
    <p class="analysis-para">${careerFit}</p>
  </div>

  <div class="res-hero">
    <div class="res-top">
      <div class="res-left"><div class="res-count" id="res-count">0</div><div class="res-count-lbl">matching paths</div></div>
      <div class="res-right">
        <div class="res-phdr">Your profile snapshot</div>
        <div class="res-pline"><strong>${elabel}</strong> · ${glabels}</div>
        <div class="rpill-wrap">${cnames.map(n=>`<span class="rpill">${n}</span>`).join('')}</div>
      </div>
    </div>
  </div>

  <div class="frow">
    <button class="fc on" data-f="All" style="background:#1D9E75">All (${all.length})</button>
    ${SECTORS.filter(s=>all.some(j=>j.s===s)).map(s=>{
      const col=SC[s]||['#888','#eee','#333'];
      const cnt=all.filter(j=>j.s===s).length;
      const on=state.filter===s;
      return`<button class="fc${on?' on':''}" data-f="${s}" style="${on?`background:${col[0]}`:`color:${col[0]};border-color:${col[0]}55`}">${s} (${cnt})</button>`;
    }).join('')}
  </div>

  <div class="jlist">${shown.map((j,i)=>{
    const col=SC[j.s]||['#888','#eee','#333'];
    const isTop=i===0&&state.filter==='All';
    return`<div class="jc${isTop?' top-match':''}" style="animation-delay:${i*15}ms">
      ${isTop?`<div class="top-badge">Top match</div>`:''}
      <div class="jc-row">
        <div class="jc-side" style="background:${col[0]}"></div>
        <div class="jc-inner">
          <div class="jc-head" onclick="tog(this)">
            <div class="jc-left">
              <div class="jc-title">${j.t}</div>
              <div class="jc-meta">
                <span class="stag" style="background:${col[1]};color:${col[2]}">${j.s}</span>
                ${j.mc.slice(0,2).map(cid=>{const p=CPAL[cid]||{light:'#E1F5EE',text:'#0F6E56',mid:'#9FE1CB'};return`<span style="font-size:11px;padding:2px 9px;border-radius:20px;background:${p.light};color:${p.text};border:1px solid ${p.mid};font-weight:600">${cl(cid)}</span>`;}).join('')}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">${ring(j.score)}<div class="chv">&#8964;</div></div>
          </div>
          <div class="jb">
            <div class="jb-in">
              <p class="jb-desc">${j.d}</p>
              ${j.mc.length?`<div class="jb-match-lbl">Why it fits you</div><div class="jb-pills">${j.mc.map(cid=>{const p=CPAL[cid]||{light:'#E1F5EE',text:'#0F6E56',mid:'#9FE1CB'};return`<span class="jb-pill" style="background:${p.light};color:${p.text};border:1px solid ${p.mid}">${cl(cid)}</span>`;}).join('')}</div>`:''}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>

  <div class="challenge-card">
    <div class="challenge-title">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#BA7517;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      An honest heads up
    </div>
    <p class="challenge-para">${challenge}</p>
  </div>

  <div class="analysis-block">
    <div class="analysis-ey">Your next concrete moves</div>
    <div class="steps-list">
      ${steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}
    </div>
  </div>

  <div class="divider"></div>
  <div class="restart-row"><button class="btn" onclick="restart()">Start over</button></div>
</div>`;}

function tog(head){
  const jb=head.closest('.jc-inner').querySelector('.jb');
  const chv=head.querySelector('.chv');
  if(jb)jb.classList.toggle('open');
  if(chv)chv.classList.toggle('open');
}
function restart(){state={step:-1,edu:null,satisfaction:null,goals:new Set(),cats:new Set(),values:new Set(),workstyle:null,risk:null,filter:'All',dir:1,loading:false};render();}

function render(){
  renderProg();
  const a=document.getElementById('app');
  if(state.step<0){a.innerHTML=heroHTML();}
  else if(state.loading){a.innerHTML=loadingHTML();startLoading();}
  else if(state.step===0){a.innerHTML=eduHTML();}
  else if(state.step===1){a.innerHTML=satHTML();}
  else if(state.step===2){a.innerHTML=goalHTML();}
  else if(state.step===3){a.innerHTML=skillsHTML();}
  else if(state.step===4){a.innerHTML=valuesHTML();}
  else if(state.step===5){a.innerHTML=workRiskHTML();}
  else{a.innerHTML=resultsHTML();requestAnimationFrame(()=>animateNum('res-count',scoreJobs().length));}
  a.innerHTML=a.innerHTML.replace(/—/g,' - ');
  bind();
  if(state.step===6)document.querySelectorAll('.jc').forEach((el,i)=>{el.style.animationDelay=`${i*14}ms`;});
}

function bind(){
  const s=document.getElementById('start-btn');if(s)s.addEventListener('click',()=>{state.dir=1;state.step=0;render();});
  document.querySelectorAll('[data-edu]').forEach(el=>el.addEventListener('click',()=>{state.edu=el.dataset.edu;render();}));
  document.querySelectorAll('[data-sat]').forEach(el=>el.addEventListener('click',()=>{state.satisfaction=el.dataset.sat;render();}));
  document.querySelectorAll('[data-goal]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.goal;state.goals.has(id)?state.goals.delete(id):state.goals.add(id);render();}));
  document.querySelectorAll('[data-cat]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.cat;state.cats.has(id)?state.cats.delete(id):state.cats.add(id);render();}));
  document.querySelectorAll('[data-val]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.val;state.values.has(id)?state.values.delete(id):state.values.add(id);render();}));
  document.querySelectorAll('[data-ws]').forEach(el=>el.addEventListener('click',()=>{state.workstyle=el.dataset.ws;render();}));
  document.querySelectorAll('[data-rk]').forEach(el=>el.addEventListener('click',()=>{state.risk=el.dataset.rk;render();}));
  document.querySelectorAll('[data-f]').forEach(el=>el.addEventListener('click',()=>{state.filter=el.dataset.f;render();}));
  const n=document.getElementById('nxt');if(n)n.addEventListener('click',()=>{
    if(state.step===5){state.loading=true;state.step=6;}else{state.dir=1;state.step++;}render();
  });
  const b=document.getElementById('bck');if(b)b.addEventListener('click',()=>{state.dir=-1;state.step--;render();});
}

document.addEventListener('keydown',e=>{
  if(state.step>=0&&state.step<=5){
    const maps=[EDU,SATISFACTION,null,WORKSTYLE,RISK];
    if(state.step===2){
      const idx=KEYS.toLowerCase().indexOf(e.key.toLowerCase());
      if(idx>=0&&idx<GOALS.length){const id=GOALS[idx].id;state.goals.has(id)?state.goals.delete(id):state.goals.add(id);render();return;}
      if(e.key==='Enter'&&state.goals.size>0){state.dir=1;state.step++;render();}
    } else if(state.step===3){
      if(e.key==='Enter'&&state.cats.size>0){state.dir=1;state.step++;render();}
    } else if(state.step===4){
      const idx=KEYS.toLowerCase().indexOf(e.key.toLowerCase());
      if(idx>=0&&idx<VALUES.length){const id=VALUES[idx].id;state.values.has(id)?state.values.delete(id):state.values.add(id);render();return;}
      if(e.key==='Enter'&&state.values.size>0){state.dir=1;state.step++;render();}
    } else {
      const items=[EDU,SATISFACTION,null,null,null,null][state.step];
      if(items){
        const idx=KEYS.toLowerCase().indexOf(e.key.toLowerCase());
        if(idx>=0&&idx<items.length){
          if(state.step===0)state.edu=items[idx].id;
          else if(state.step===1)state.satisfaction=items[idx].id;
          render();return;
        }
      }
      if(e.key==='Enter'){
        const ready=[state.edu,state.satisfaction,null,null,null,state.workstyle&&state.risk][state.step];
        if(ready){if(state.step===5){state.loading=true;state.step=6;}else{state.dir=1;state.step++;}render();}
      }
    }
  }
});
render();
</script>
